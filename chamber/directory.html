    <!-- Favicon -->

    <!-- Facebook Open Graph -->
    <meta property="og:title" content="Kampala Chamber of Commerce Directory">

<body>

        <button id="menuButton">☰</button>

        <nav id="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>

                <li><a href="#">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>

    <main>

            <p>Plot 1 Parliament Avenue</p>

            <p>Tracy Bulyaba</p>
